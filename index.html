<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">
<title>德邦胶水产品库 Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{--ink:#0f172a;--ink2:#334155;--ink3:#64748b;--ink4:#94a3b8;--sf:#f8fafc;--card:#fff;--bd:#e2e8f0;--bd2:#cbd5e1;--brand:#1e40af;--bl:#3b82f6;--bbg:#eff6ff;--accent:#ea580c;--abg:#fff7ed;--green:#16a34a;--gbg:#f0fdf4;--amber:#d97706;--ambg:#fffbeb;--red:#dc2626;--purple:#7c3aed;--pbg:#f5f3ff;--sh:0 1px 3px rgba(0,0,0,.08);--shm:0 4px 12px rgba(0,0,0,.08);--r:8px;--rl:12px;--f:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;--mono:'JetBrains Mono','SF Mono',Menlo,monospace}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:15px;-webkit-tap-highlight-color:transparent}
body{font-family:var(--f);background:var(--sf);color:var(--ink);line-height:1.5;padding-bottom:72px;overflow-x:hidden}

/* Header */
.hd{background:var(--ink);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:200;transition:padding .25s}
.hd.mini{padding:8px 16px}
.hd-in{max-width:1280px;margin:0 auto;display:flex;align-items:stretch;justify-content:space-between}
.logo{font-size:1.15rem;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:8px}
.logo-ic{width:28px;height:28px;background:var(--bl);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px}
.hd-badges{display:flex;gap:8px;font-size:.75rem}
.hb{padding:2px 10px;border-radius:20px;background:rgba(255,255,255,.12)}
.hb b{font-weight:600}

/* Search */
.sw{background:var(--card);border-bottom:1px solid var(--bd);padding:10px 16px;position:sticky;top:48px;z-index:190;transition:top .25s,transform .3s,opacity .3s}
.sw.col{top:38px}.sw.hid{transform:translateY(-100%);opacity:0;pointer-events:none}
.sr{max-width:1280px;margin:0 auto;display:flex;gap:8px;align-items:center}
.siw{flex:1;position:relative}
.si{width:100%;padding:9px 36px 9px 14px;border:1.5px solid var(--bd);border-radius:var(--r);font-size:.9rem;font-family:var(--f);background:var(--sf);transition:border-color .2s}
.si:focus{outline:none;border-color:var(--brand);background:#fff}
.si::placeholder{color:var(--ink4)}
.sc{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;border:none;background:var(--bd);color:var(--ink3);font-size:12px;cursor:pointer;display:none;align-items:center;justify-content:center}
.sc.show{display:flex}
.bai{padding:9px 16px;border-radius:var(--r);border:1.5px solid var(--brand);background:var(--bbg);color:var(--brand);font-weight:600;font-size:.8rem;cursor:pointer;white-space:nowrap;font-family:var(--f);transition:all .2s}
.bai:hover,.bai.on{background:var(--brand);color:#fff}

/* Filters */
.fb{max-width:1280px;margin:0 auto;padding-top:8px;display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.fg{display:flex;align-items:center;gap:4px}
.fl{font-size:.7rem;color:var(--ink4);font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-right:2px}
.chip{padding:3px 10px;border:1px solid var(--bd);border-radius:20px;background:#fff;color:var(--ink2);font-size:.73rem;cursor:pointer;transition:all .15s;font-family:var(--f);white-space:nowrap;user-select:none}
.chip:hover{border-color:var(--brand);color:var(--brand)}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.chip.comp{border-color:var(--purple);color:var(--purple)}
.chip.comp.on{background:var(--purple);color:#fff;border-color:var(--purple)}
.fsep{width:1px;height:20px;background:var(--bd);margin:0 4px}

/* Toolbar */
.tb{max-width:1280px;margin:0 auto;padding:10px 16px;display:flex;justify-content:space-between;align-items:center}
.rc{font-size:.8rem;color:var(--ink3)}.rc b{color:var(--ink);font-weight:600}
.vts{display:flex;gap:4px}
.vb{width:32px;height:32px;border:1px solid var(--bd);border-radius:6px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink3);font-size:14px;transition:all .15s}
.vb:hover{border-color:var(--ink3)}.vb.on{background:var(--ink);color:#fff;border-color:var(--ink)}

/* AI Panel */
.aip{max-width:1280px;margin:0 auto;padding:0 16px;display:none}.aip.show{display:block}
.aibx{background:linear-gradient(135deg,var(--bbg),#f0f4ff);border:1.5px solid #bfdbfe;border-radius:var(--rl);padding:16px;margin-bottom:12px}
.aibx-t{font-size:.85rem;font-weight:600;color:var(--brand);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.aita{width:100%;min-height:60px;max-height:120px;padding:10px 12px;border:1px solid #bfdbfe;border-radius:var(--r);font-size:.85rem;font-family:var(--f);resize:vertical;background:#fff;color:var(--ink)}
.aita:focus{outline:none;border-color:var(--brand)}.aita::placeholder{color:var(--ink4)}
.aikr{display:flex;gap:8px;align-items:center;margin-top:8px}
.aips{padding:6px 10px;border:1px solid #bfdbfe;border-radius:var(--r);font-size:.78rem;font-family:var(--f);background:#fff;cursor:pointer}
.aiki{flex:1;padding:6px 10px;border:1px solid #bfdbfe;border-radius:var(--r);font-size:.78rem;font-family:var(--mono);background:#fff}
.aiki:focus{outline:none;border-color:var(--brand)}
.aiact{display:flex;gap:8px;margin-top:10px;align-items:center}
.aisb{padding:8px 20px;border-radius:var(--r);border:none;background:var(--brand);color:#fff;font-weight:600;font-size:.82rem;cursor:pointer;font-family:var(--f);transition:background .2s}
.aisb:hover{background:#1e3a8a}.aisb:disabled{opacity:.5;cursor:not-allowed}
.aihn{font-size:.72rem;color:var(--ink4)}
.aire{margin-top:12px;padding:14px;background:#fff;border-radius:var(--r);border:1px solid var(--bd);font-size:.85rem;line-height:1.7;color:var(--ink2);white-space:pre-wrap;max-height:400px;overflow-y:auto}
.aire:empty{display:none}.aild{color:var(--brand);font-style:italic}

/* Recent */
.rs{max-width:1280px;margin:0 auto;padding:0 16px 8px}
.rst{font-size:.78rem;font-weight:600;color:var(--ink3);margin-bottom:6px;display:flex;align-items:center;gap:6px}
.rst .cnt{background:var(--bbg);color:var(--brand);padding:1px 8px;border-radius:10px;font-size:.7rem}
.rscr{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.rscr::-webkit-scrollbar{display:none}
.rchip{flex:0 0 auto;padding:6px 12px;background:var(--card);border:1px solid var(--bd);border-radius:var(--r);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px}
.rchip:hover{border-color:var(--brand);box-shadow:var(--sh)}
.rchip-m{font-weight:600;font-size:.82rem;color:var(--brand);white-space:nowrap}
.rchip-t{font-size:.68rem;color:var(--ink4);white-space:nowrap}

/* Grid Cards */
.ma{max-width:1280px;margin:0 auto;padding:0 16px 16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.cd{background:var(--card);border-radius:var(--rl);border:1.5px solid var(--bd);padding:14px 16px;cursor:pointer;transition:all .2s;position:relative}
.cd:hover{border-color:var(--bl);box-shadow:var(--shm);transform:translateY(-1px)}
.cd.comp{border-color:var(--purple)}.cd.sel{border-color:var(--accent);background:var(--abg)}
.cd-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.cd-mdl{font-size:1.05rem;font-weight:700;color:var(--brand);font-family:var(--mono);letter-spacing:-.02em}
.cbg{font-size:.62rem;padding:2px 7px;border-radius:4px;font-weight:600;text-transform:uppercase;letter-spacing:.03em}
.bg-pur{background:#dbeafe;color:#1d4ed8}.bg-ir{background:#fce7f3;color:#be185d}.bg-uv{background:var(--gbg);color:#15803d}.bg-ep{background:#fef3c7;color:#92400e}.bg-si{background:#e0e7ff;color:#4338ca}.bg-ac{background:#ede9fe;color:#6d28d9}.bg-cd{background:#ccfbf1;color:#0f766e}.bg-ot{background:#f1f5f9;color:#475569}.bg-cp{background:var(--purple);color:#fff;font-size:.6rem;margin-left:4px}
.cd-ch{font-size:.75rem;color:var(--ink3);margin-bottom:8px}
.cd-pr{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.pt{font-size:.7rem;padding:2px 7px;border-radius:4px;background:var(--sf);color:var(--ink2);font-family:var(--mono);font-weight:400}
.pt.k{background:var(--bbg);color:var(--brand);font-weight:500}
.cd-desc{font-size:.78rem;color:var(--ink3);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.3em}
.cd-bot{display:flex;justify-content:space-between;align-items:center;margin-top:8px;padding-top:8px;border-top:1px solid var(--bd)}
.cd-comp{display:flex;gap:2px;align-items:center}
.bdot{width:16px;height:3px;border-radius:2px;background:var(--bd)}.bdot.f{background:var(--green)}.bdot.p{background:var(--amber)}
.cd-dt{font-size:.68rem;color:var(--ink4)}
.cd-ck{position:absolute;bottom:12px;right:12px;width:24px;height:24px;border-radius:50%;border:1.5px solid var(--bd);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .15s;color:transparent}
.cd-ck:hover{border-color:var(--accent)}.cd-ck.on{background:var(--accent);border-color:var(--accent);color:#fff}

/* List View */
.lv{display:none}
.lt{width:100%;border-collapse:collapse;background:var(--card);border-radius:var(--rl);overflow:hidden;box-shadow:var(--sh)}
.lt th{text-align:left;padding:10px 12px;font-size:.72rem;font-weight:600;color:var(--ink3);background:var(--sf);border-bottom:2px solid var(--bd);white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
.lt td{padding:10px 12px;font-size:.82rem;border-bottom:1px solid var(--bd);color:var(--ink2)}
.lt tr{cursor:pointer;transition:background .1s}.lt tbody tr:hover{background:var(--bbg)}
.lt .tm{font-weight:600;color:var(--brand);font-family:var(--mono)}.lt .tn{font-family:var(--mono);font-size:.78rem}

/* Board View */
.bv{display:none;overflow-x:auto;gap:12px;padding-bottom:12px}
.bc{flex:0 0 260px;background:var(--sf);border-radius:var(--rl);overflow:hidden;border:1px solid var(--bd)}
.bch{padding:10px 14px;font-size:.82rem;font-weight:600;color:var(--ink);background:var(--card);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between}
.bcc{font-size:.72rem;color:var(--ink4);font-weight:400}
.bcb{padding:8px;display:flex;flex-direction:column;gap:6px;max-height:60vh;overflow-y:auto}
.bi{padding:10px 12px;background:var(--card);border-radius:var(--r);border:1px solid var(--bd);cursor:pointer;transition:all .15s}
.bi:hover{border-color:var(--bl);box-shadow:var(--sh)}
.bi-m{font-weight:600;font-size:.85rem;color:var(--brand);font-family:var(--mono)}
.bi-s{font-size:.72rem;color:var(--ink3);margin-top:2px}

/* Sub-Page */
.sp{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--sf);z-index:500;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto;-webkit-overflow-scrolling:touch}
.sp.open{transform:translateX(0)}
.sph{position:sticky;top:0;z-index:10;background:var(--card);border-bottom:1px solid var(--bd);padding:12px 16px;display:flex;align-items:center;gap:12px}
.spbk{border:none;background:none;font-size:1.1rem;cursor:pointer;color:var(--brand);font-weight:600;display:flex;align-items:center;gap:4px;font-family:var(--f)}
.sptt{font-size:1.05rem;font-weight:700;font-family:var(--mono)}
.spbd{padding:16px;max-width:800px;margin:0 auto;padding-bottom:80px}

/* Detail sections */
.ds{background:var(--card);border-radius:var(--rl);padding:16px;margin-bottom:12px;border:1px solid var(--bd)}
.dst{font-size:.82rem;font-weight:700;color:var(--ink);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.dil{font-size:.7rem;color:var(--ink4);font-weight:500;text-transform:uppercase;letter-spacing:.03em;margin-bottom:2px}
.div{font-size:.88rem;color:var(--ink);line-height:1.4;word-break:break-word}
.div.imp{color:var(--brand);font-weight:600}
.dfs{display:flex;flex-wrap:wrap;gap:6px}
.dft{padding:4px 10px;background:var(--bbg);color:var(--brand);border-radius:20px;font-size:.75rem}
.dn{font-size:.85rem;line-height:1.7;color:var(--ink2);white-space:pre-wrap}
.dtabs{display:flex;gap:0;border-bottom:2px solid var(--bd);margin-bottom:16px}
.dtab{padding:8px 16px;font-size:.82rem;font-weight:500;color:var(--ink3);cursor:pointer;border:none;background:none;font-family:var(--f);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.dtab.on{color:var(--brand);border-bottom-color:var(--brand);font-weight:600}
.dtc{display:none}.dtc.on{display:block}

/* Sticky compare button */
.spcs{position:sticky;bottom:0;background:var(--card);border-top:1px solid var(--bd);padding:12px 16px;display:flex;gap:8px;justify-content:center}
.bp{padding:10px 28px;border-radius:var(--r);border:none;background:var(--brand);color:#fff;font-weight:600;font-size:.85rem;cursor:pointer;font-family:var(--f);transition:all .2s}
.bp:hover{background:#1e3a8a}.bp:disabled{opacity:.4;cursor:not-allowed}

/* Compare Modal */
.mo{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:600;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.mo.open{display:flex}
.ms{background:var(--card);border-radius:var(--rl) var(--rl) 0 0;width:100%;max-width:900px;max-height:85vh;overflow-y:auto;padding:20px;animation:su .3s ease}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
.msh{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.msh h2{font-size:1.1rem;font-weight:700}
.mcl{width:32px;height:32px;border-radius:50%;border:none;background:var(--sf);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.ct{width:100%;border-collapse:collapse;font-size:.82rem}
.ct th{text-align:left;padding:8px 12px;background:var(--sf);font-size:.72rem;font-weight:600;color:var(--ink3);border-bottom:1px solid var(--bd);position:sticky;top:0}
.ct td{padding:8px 12px;border-bottom:1px solid var(--bd);vertical-align:top}
.ct .rl{font-weight:500;color:var(--ink3);white-space:nowrap;font-size:.75rem;width:100px}

/* Compare Bar */
.cb{position:fixed;bottom:56px;left:0;right:0;background:var(--card);border-top:1px solid var(--bd);padding:8px 16px;z-index:180;display:none;align-items:center;justify-content:space-between;box-shadow:0 -2px 8px rgba(0,0,0,.06)}
.cb.show{display:flex}
.cbt{font-size:.8rem;color:var(--ink3)}.cbt b{color:var(--accent)}
.cba{display:flex;gap:8px}
.bs{padding:6px 14px;border-radius:6px;font-size:.78rem;font-family:var(--f);cursor:pointer;font-weight:500}
.bsp{background:var(--brand);color:#fff;border:none}
.bsg{background:none;color:var(--ink3);border:1px solid var(--bd)}

/* Bottom Nav */
.bn{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--bd);display:flex;z-index:190;padding:4px 0 env(safe-area-inset-bottom,0)}
.bn-desktop{display:none;gap:0;align-items:stretch}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 0;cursor:pointer;border:none;background:none;color:var(--ink4);font-size:.65rem;font-family:var(--f);transition:color .15s}
.ni.on{color:var(--brand)}.ni .nic{font-size:18px}

/* Projects */
.pl{display:none}
.pjc{background:var(--card);border:1px solid var(--bd);border-radius:var(--rl);padding:16px;margin-bottom:10px;cursor:pointer;transition:all .15s}
.pjc:hover{border-color:var(--bl);box-shadow:var(--sh)}
.pjn{font-size:1rem;font-weight:700;color:var(--ink);margin-bottom:4px}
.pjcu{font-size:.78rem;color:var(--ink3);margin-bottom:6px}
.pjs{font-size:.82rem;color:var(--ink2);line-height:1.5;margin-bottom:8px}
.pjm{display:flex;gap:10px;font-size:.72rem;color:var(--ink4);flex-wrap:wrap}
.pjsb{padding:2px 10px;border-radius:4px;font-size:.7rem;font-weight:600}
.sv{background:var(--gbg);color:var(--green)}.sd{background:var(--ambg);color:var(--amber)}

/* Collapsible */
.cls{background:var(--card);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:8px;overflow:hidden}
.clh{padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.clh h3{font-size:.88rem;font-weight:600}
.cla{font-size:14px;color:var(--ink4);transition:transform .2s}
.cls.open .cla{transform:rotate(90deg);color:var(--brand)}
.clb{padding:0 14px 14px;display:none}.cls.open .clb{display:block}

/* Test Report */
.trb{margin-bottom:16px}
.trt{font-size:.82rem;font-weight:600;margin-bottom:8px;color:var(--ink)}
.trtb{width:100%;border-collapse:collapse;font-size:.78rem}
.trtb th{text-align:left;padding:6px 10px;background:var(--sf);font-size:.7rem;font-weight:600;color:var(--ink3);border-bottom:1px solid var(--bd)}
.trtb td{padding:6px 10px;border-bottom:1px solid var(--bd)}

/* Empty */
.es{text-align:center;padding:60px 20px;color:var(--ink3)}
.es .esi{font-size:48px;margin-bottom:12px;opacity:.4}
.es p{font-size:.9rem;margin-bottom:12px}
.es button{padding:8px 20px;border-radius:var(--r);border:1px solid var(--bd);background:#fff;cursor:pointer;font-family:var(--f);font-size:.82rem}

@keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fin{animation:fi .3s ease both}

@media(max-width:640px){
html{font-size:14px}.grid{grid-template-columns:1fr}.fb{gap:4px}.chip{font-size:.7rem;padding:3px 8px}
.lt{font-size:.75rem;display:block;overflow-x:auto}.lt th,.lt td{padding:8px 8px}
.bc{flex:0 0 85vw}.dg{grid-template-columns:1fr 1fr}.aita{min-height:50px}
}
@media(min-width:1024px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(320px,1fr))}
  body{padding-bottom:16px}
  .cb.show{bottom:0}
  .bn{display:none}
  .bn-desktop{display:flex}
  .ni-d{display:flex;flex-direction:row;align-items:center;gap:6px;padding:0 18px;height:100%;font-size:.82rem;font-family:var(--f);cursor:pointer;border:none;background:none;color:var(--ink3);border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap}
  .ni-d.on{color:var(--brand);border-bottom-color:var(--brand)}
  .ni-d:hover{color:var(--ink);background:var(--sf)}
  .ni-d .nic{font-size:15px}
  .cb{bottom:0}
  .mo{align-items:center}
  .ms{border-radius:var(--rl);max-width:960px;max-height:80vh}
}

::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:4px}
</style>
</head>
<body>

<!-- 密码保护层 -->
<div id="authGate" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0f172a;z-index:99999;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <div style="background:#fff;border-radius:16px;padding:40px 32px;max-width:360px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)">
    <div style="font-size:40px;margin-bottom:12px">🔒</div>
    <h2 style="font-size:1.2rem;color:#0f172a;margin-bottom:4px">德邦胶水产品库</h2>
    <p style="font-size:.85rem;color:#64748b;margin-bottom:24px">内部系统 · 请输入访问密码</p>
    <input id="authPwd" type="password" placeholder="输入密码" style="width:100%;padding:12px 16px;border:2px solid #e2e8f0;border-radius:10px;font-size:1rem;outline:none;transition:border .2s" onfocus="this.style.borderColor='#3b82f6'" onblur="this.style.borderColor='#e2e8f0'">

<script>
var AUTH_HASH='b9c4ba6bec23c2dd27fad284714bf00cb8f248e9a9dfcfc03b70f486e8d16a47';
async function sha256(s){var b=new TextEncoder().encode(s);var h=await crypto.subtle.digest('SHA-256',b);return Array.from(new Uint8Array(h)).map(function(x){return x.toString(16).padStart(2,'0')}).join('')}
async function checkAuth(){
  var p=document.getElementById('authPwd').value;
  if(!p){document.getElementById('authErr').textContent='请输入密码';return}
  var h=await sha256(p);
  if(h===AUTH_HASH){sessionStorage.setItem('gluedb_auth','1');document.getElementById('authGate').remove();document.getElementById('mainApp').style.display=''}
  else{document.getElementById('authErr').textContent='密码错误，请重试';document.getElementById('authPwd').value='';document.getElementById('authPwd').focus()}
}
document.addEventListener('DOMContentLoaded',function(){
  if(sessionStorage.getItem('gluedb_auth')==='1'){document.getElementById('authGate').remove();document.getElementById('mainApp').style.display=''}
  document.getElementById('authPwd').addEventListener('keydown',function(e){if(e.key==='Enter')checkAuth()});
});
</script>

    document.getElementById('subPage').classList.add('open'); document.body.style.overflow = 'hidden';

  renderTR: function(reports) {
    if (!reports || !reports.length) return '<p style="color:var(--ink4)">暂无测试报告</p>';

    function isLeaf(v) {
      if (v === null || v === undefined || typeof v !== 'object' || Array.isArray(v)) return true;
      var ks = Object.keys(v);
      return ks.length > 0 && ks.every(function(k) { return k === 'value' || k === 'ti' || k === 'unit'; });
    }

    function renderSection(title, sd, unit) {
      if (!sd || typeof sd !== 'object') return '';
      var h = '<div class="trb" style="margin-bottom:14px">';
      h += '<div style="font-size:.8rem;font-weight:700;color:var(--brand);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--bd)">' + esc(title) + (unit ? ' <span style="font-weight:400;color:var(--ink4)">(' + esc(unit) + ')</span>' : '') + '</div>';
      var entries = Object.entries(sd).filter(function(e) { return e[0] !== 'unit'; });
      if (!entries.length) return h + '</div>';
      var firstVal = entries[0][1];

      // 情况A：所有值是叶子 → 简单kv
      if (entries.every(function(e) { return isLeaf(e[1]); })) {
        h += '<table class="trtb"><tbody>';
        entries.forEach(function(e) { h += '<tr><td class="rl">' + esc(e[0]) + '</td><td>' + esc(fmtV(e[1])) + '</td></tr>'; });
        h += '</tbody></table>';

      // 情况B：一层嵌套 → { 产品: 值 }，产品为列
      } else if (!Array.isArray(firstVal) && typeof firstVal === 'object' && isLeaf(Object.values(firstVal || {})[0])) {
        var cols = new Set();
        entries.forEach(function(e) { if (e[1] && typeof e[1] === 'object') Object.keys(e[1]).forEach(function(k) { if (k !== 'unit') cols.add(k); }); });
        var colArr = Array.from(cols);
        h += '<table class="trtb"><thead><tr><th>项目</th>' + colArr.map(function(c) { return '<th style="color:var(--brand)">' + esc(c) + '</th>'; }).join('') + '</tr></thead><tbody>';
        entries.forEach(function(e) {
          var key = e[0], row = e[1];
          if (typeof row === 'string' || typeof row === 'number') { h += '<tr><td class="rl">' + esc(key) + '</td><td colspan="' + colArr.length + '">' + esc(String(row)) + '</td></tr>'; }
          else { h += '<tr><td class="rl">' + esc(key) + '</td>' + colArr.map(function(c) { return '<td>' + (row[c] !== undefined ? esc(fmtV(row[c])) : '-') + '</td>'; }).join('') + '</tr>'; }
        });
        h += '</tbody></table>';

      // 情况C：两层嵌套 → { 基材: { 条件: { 产品: 值 } } }
      } else {
        entries.forEach(function(e) {
          var subKey = e[0], subData = e[1];
          if (!subData || typeof subData !== 'object') return;
          var subUnit = subData.unit || '';
          h += '<div style="margin-bottom:10px"><div style="font-size:.76rem;font-weight:600;color:var(--ink2);margin-bottom:4px">▸ ' + esc(subKey) + (subUnit ? ' (' + esc(subUnit) + ')' : '') + '</div>';
          var timeEntries = Object.entries(subData).filter(function(x) { return x[0] !== 'unit'; });
          var prods2 = new Set();
          timeEntries.forEach(function(te) { if (te[1] && typeof te[1] === 'object' && !Array.isArray(te[1])) Object.keys(te[1]).forEach(function(k) { if (k !== 'unit') prods2.add(k); }); });
          var prodArr = Array.from(prods2);
          if (prodArr.length) {
            h += '<table class="trtb"><thead><tr><th>条件</th>' + prodArr.map(function(p) { return '<th style="color:var(--brand)">' + esc(p) + '</th>'; }).join('') + '</tr></thead><tbody>';
            timeEntries.forEach(function(te) {
              var cond = te[0], row = te[1];
              if (typeof row === 'string' || typeof row === 'number') { h += '<tr><td class="rl">' + esc(cond) + '</td><td colspan="' + prodArr.length + '">' + esc(String(row)) + '</td></tr>'; }
              else { h += '<tr><td class="rl">' + esc(cond) + '</td>' + prodArr.map(function(p) { return '<td>' + (row[p] !== undefined ? esc(fmtV(row[p])) : '-') + '</td>'; }).join('') + '</tr>'; }
            });
            h += '</tbody></table>';
          } else {
            h += '<table class="trtb"><tbody>' + timeEntries.map(function(te) { return '<tr><td class="rl">' + esc(te[0]) + '</td><td>' + esc(fmtV(te[1])) + '</td></tr>'; }).join('') + '</tbody></table>';
          }
          h += '</div>';
        });
      }
      return h + '</div>';
    }

    return reports.map(function(r) {
      var d = r.data || {};
      var h = '<div style="background:var(--sf);border-radius:var(--r);padding:12px 14px;margin-bottom:12px;border:1px solid var(--bd)">';
      h += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
      h += '<div style="font-size:.85rem;font-weight:700;color:var(--ink)">📊 ' + esc(r.reportId || 'Report') + '</div>';
      h += '<div style="font-size:.75rem;color:var(--ink4)">' + esc(r.date || '') + '</div></div>';
      if (r.comparisonProducts && r.comparisonProducts.length) {
        h += '<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px">' + r.comparisonProducts.map(function(p) { return '<span style="padding:2px 8px;border-radius:10px;font-size:.72rem;background:var(--bbg);color:var(--brand)">' + esc(p) + '</span>'; }).join('') + '</div>';
      }
      Object.entries(d).forEach(function(se) {
        var secName = se[0], secData = se[1];
        if (!secData || typeof secData !== 'object') return;
        h += renderSection(secName, secData, secData.unit || '');
      });
      return h + '</div>';
    }).join('');
  },

    inp.accept = '.pdf,.txt,.csv,.json,.xlsx,.png,.jpg,.jpeg';

  parseReportFile: function(prodId, file, tabId) {
    var self = this;
    var prod = this.data.products.find(function(p) { return p.id === prodId; });
    if (!prod) return;

    // 显示进度提示
    var dtr = document.getElementById('dtr');
    var loadingDiv = document.createElement('div');
    loadingDiv.id = 'uploadLoading';
    loadingDiv.innerHTML = '<div style="text-align:center;padding:24px;color:var(--ink3)"><div style="font-size:24px;margin-bottom:8px">⏳</div><div style="font-size:.85rem">AI 正在解析文件...</div><div style="font-size:.75rem;margin-top:4px;color:var(--ink4)">' + file.name + '</div></div>';
    if (dtr) { dtr.innerHTML = ''; dtr.appendChild(loadingDiv); APP.swTab(document.querySelector('.dtab[onclick*="dtr"]'), 'dtr'); }

    var reader = new FileReader();
    reader.onload = function(e) {
      var content = '';
      if (file.type === 'application/json') {
        // JSON 文件直接尝试解析为 testReport 格式
        try {
          var parsed = JSON.parse(e.target.result);
          self.mergeReport(prodId, parsed, tabId);
          return;
        } catch(ex) { content = e.target.result; }
      } else if (file.name.endsWith('.json')) {
        try {
          var parsed = JSON.parse(e.target.result);
          self.mergeReport(prodId, parsed, tabId);
          return;
        } catch(ex) { content = e.target.result; }
      } else {
        content = e.target.result;
      }
      // 其他格式：调用 AI 解析
      self.aiParseReport(prodId, prod.model, content, file.name, tabId);
    };

    if (file.type === 'application/json' || file.name.endsWith('.json')) {
      reader.readAsText(file);
    } else if (file.type.startsWith('image/')) {
      reader.readAsDataURL(file);
    } else {
      reader.readAsText(file);
    }
  },

  aiParseReport: function(prodId, model, content, filename, tabId) {
    var self = this;
    var key = localStorage.getItem('db_ai_key') || document.getElementById('aiKey').value;
    var provider = document.getElementById('aiProvider').value || 'claude';

    // 截断过长内容
    var maxLen = 6000;
    var truncated = content.length > maxLen ? content.substring(0, maxLen) + '\n...(内容已截断)' : content;

    var prompt = '你是一个专业的胶水产品测试报告解析助手。请把以下测试报告内容解析为标准的 JSON 格式。\n\n' +
      '产品型号: ' + model + '\n文件名: ' + filename + '\n\n报告内容:\n' + truncated + '\n\n' +
      '请输出一个 JSON 对象，格式如下（只输出 JSON，不要其他说明）:\n' +
      '{\n  "reportId": "报告编号或自动生成",\n  "date": "YYYY-MM-DD",\n  "batch": "批次号（没有则空字符串）",\n  "type": "Test Report",\n  "comparisonProducts": ["对比产品1", "对比产品2"],\n' +
      '  "data": {\n    "章节名": {\n      "产品型号或条件": 数值或字符串,\n      "unit": "单位"\n    }\n  }\n}';

    var apiUrl = provider === 'claude'
      ? 'https://api.anthropic.com/v1/messages'
      : 'https://api.deepseek.com/v1/chat/completions';

    var requestBody, headers;
    if (provider === 'claude') {
      headers = { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01' };
      requestBody = { model: 'claude-haiku-4-5-20251001', max_tokens: 2000, messages: [{ role: 'user', content: prompt }] };
    } else {
      headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key };
      requestBody = { model: 'deepseek-chat', max_tokens: 2000, messages: [{ role: 'user', content: prompt }] };
    }

    fetch(apiUrl, { method: 'POST', headers: headers, body: JSON.stringify(requestBody) })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var text = provider === 'claude'
          ? (data.content && data.content[0] && data.content[0].text || '')
          : (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content || '');
        // 提取 JSON
        var jsonMatch = text.match(/\{[\s\S]*\}/);
        if (!jsonMatch) throw new Error('AI 未返回有效 JSON');
        var report = JSON.parse(jsonMatch[0]);
        self.mergeReport(prodId, report, tabId);
      })
      .catch(function(err) {
        var dtr = document.getElementById('dtr');
        if (dtr) dtr.innerHTML = '<div style="padding:16px;color:red;font-size:.85rem">❌ 解析失败: ' + err.message + '<br><small>请检查 API Key 是否正确，或手动复制内容后联系管理员</small></div>' + self.renderTR(APP.data.products.find(function(p){return p.id===prodId;}).testReports||[]);
      });
  },

  mergeReport: function(prodId, report, tabId) {
    var self = this;
    var prod = this.data.products.find(function(p) { return p.id === prodId; });
    if (!prod) return;
    if (!prod.testReports) prod.testReports = [];

    // 检查重复 reportId
    var existIdx = prod.testReports.findIndex(function(r) { return r.reportId === report.reportId; });
    if (existIdx >= 0) {
      if (!confirm('报告 ' + report.reportId + ' 已存在，是否覆盖？')) return;
      prod.testReports[existIdx] = report;
    } else {
      prod.testReports.push(report);
    }

    // 更新 GLUE_DATA 并重新保存到 HTML（通过下载）
    self.saveAndRefresh(prodId, tabId);
  },

  saveAndRefresh: function(prodId, tabId) {
    var self = this;
    var prod = this.data.products.find(function(p) { return p.id === prodId; });

    // 刷新当前详情页
    var dtr = document.getElementById('dtr');
    if (dtr) dtr.innerHTML = self.renderTR(prod.testReports || []);

    // 提示保存
    self.showSaveBanner(prodId);
  },

  downloadUpdatedHTML: function() {
    // 读取当前页面 HTML，替换 GLUE_DATA，触发下载
    var currentHtml = document.documentElement.outerHTML;
    var newData = JSON.stringify({ products: this.data.products, projects: [], meta: { generatedAt: new Date().toISOString(), generatedBy: 'browser-upload' }, products_count: this.data.products.length }, null, 2);
    var newJs = 'const GLUE_DATA = ' + newData + ';';
    // 找到 GLUE_DATA 位置替换
    var glueIdx = currentHtml.indexOf('const GLUE_DATA');
    var scriptStart = currentHtml.lastIndexOf('<script>', glueIdx);
    var scriptEnd = currentHtml.indexOf('<\/script>', glueIdx) + '<\/script>'.length;
    if (glueIdx < 0 || scriptStart < 0 || scriptEnd < 0) { alert('无法定位数据块，请手动同步'); return; }
    var updatedHtml = currentHtml.substring(0, scriptStart) + '<script>\n' + newJs + '\n<\/script>' + currentHtml.substring(scriptEnd);
    var blob = new Blob([updatedHtml], { type: 'text/html;charset=utf-8' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '德邦胶水产品库Pro.html';
    a.click();
    URL.revokeObjectURL(a.href);
  },

  runImport: function() {
    var self = this;
    if (!this.importFiles.length) return;
    var key = document.getElementById('importKey').value || document.getElementById('aiKey').value;
    if (!key) { alert('请先输入 API Key'); document.getElementById('importKey').focus(); return; }
    localStorage.setItem('db_ai_key', key);
    localStorage.setItem('db_ai_provider', document.getElementById('importProvider').value);

    var result = document.getElementById('importResult');
    result.innerHTML = '<div style="text-align:center;padding:20px;color:var(--ink3)"><div style="font-size:22px;margin-bottom:6px">⏳</div>AI 正在识别产品并解析数据...</div>';

    // 逐文件读取，合并内容后统一发给 AI
    var readings = this.importFiles.map(function(f) {
      // PPTX: 用 JSZip 解析幻灯片文本
      if (/\.pptx?$/i.test(f.name) && typeof JSZip !== 'undefined') {
        return f.arrayBuffer().then(function(buf) {
          return JSZip.loadAsync(buf);
        }).then(function(zip) {
          var slideFiles = Object.keys(zip.files).filter(function(n) { return /^ppt\/slides\/slide\d+\.xml$/i.test(n); }).sort();
          return Promise.all(slideFiles.map(function(s) { return zip.file(s).async('string'); }));
        }).then(function(slides) {
          var text = slides.map(function(xml, i) {
            var t = xml.replace(/<a:p[^>]*>/g, '\n').replace(/<[^>]+>/g, '').replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"').replace(/&#\d+;/g, '').replace(/\n{3,}/g, '\n\n').trim();
            return '--- Slide ' + (i+1) + ' ---\n' + t;
          }).join('\n\n');
          return { name: f.name, content: text || '(PPT无可提取文本)' };
        }).catch(function() { return { name: f.name, content: '(PPT解析失败)' }; });
      }
      // 其他文件: 文本读取
      return new Promise(function(resolve) {
        var reader = new FileReader();
        reader.onload = function(e) { resolve({ name: f.name, content: e.target.result }); };
        reader.onerror = function() { resolve({ name: f.name, content: '' }); };
        reader.readAsText(f, 'utf-8');
      });
    });

    Promise.all(readings).then(function(results) {
      var combined = results.map(function(r) {
        var max = 5000;
        var c = r.content.length > max ? r.content.substring(0, max) + '\n...(已截断)' : r.content;
        return '=== 文件: ' + r.name + ' ===\n' + c;
      }).join('\n\n');

      self.callImportAI(combined, key, result);
    });
  },

  callImportAI: function(content, key, resultEl) {
    var self = this;
    var provider = document.getElementById('importProvider').value;

    // 当前产品库概要（给 AI 做匹配参考）
    var productList = this.data.products.map(function(p) {
      return p.model + '(' + (p.productType || '') + ',' + (p.brand || '') + ')';
    }).join(', ');

    var prompt = '你是德邦胶水产品库的数据管理助手。请分析以下上传的文件内容，完成两件事：\n\n' +
      '1. 识别文件涉及哪些产品（型号）\n' +
      '2. 提取结构化数据，补充到产品库中\n\n' +
      '当前产品库已有产品：\n' + productList + '\n\n' +
      '文件内容：\n' + content + '\n\n' +
      '请严格按以下 JSON 格式输出（只输出 JSON，不要 markdown 代码块，不要任何说明文字）：\n' +
      '{\n' +
      '  "summary": "一句话说明：识别到哪些产品，包含哪类数据",\n' +
      '  "actions": [\n' +
      '    {\n' +
      '      "type": "update_fields",\n' +
      '      "productModel": "产品型号（必须与产品库完全一致，或新产品则注明NEW）",\n' +
      '      "isNew": false,\n' +
      '      "confidence": 0.95,\n' +
      '      "fields": {\n' +
      '        "viscosity": "提取到的粘度值（如有）",\n' +

      '        "tensileStrength": "拉伸强度（如有）",\n' +

      '        "specificGravity": "比重（如有）",\n' +

      '        "application": "应用（如有）",\n' +
      '        "features": "特性（如有）",\n' +
      '        "notes": "补充到备注的内容（如有）"\n' +
      '      },\n' +
      '      "testReport": {\n' +
      '        "reportId": "报告编号（如文件中有，否则用日期生成如TR-20260517）",\n' +
      '        "date": "YYYY-MM-DD",\n' +

      '          "章节名（如viscosity/pushOutStrength等）": {\n' +
      '            "产品或条件": "值或嵌套对象",\n' +
      '            "unit": "单位"\n' +
      '          }\n' +
      '        }\n' +
      '      }\n' +
      '    }\n' +
      '  ]\n' +
      '}';

    var apiUrl = provider === 'claude'
      ? 'https://api.anthropic.com/v1/messages'
      : 'https://api.deepseek.com/v1/chat/completions';

    var headers, body;
    if (provider === 'claude') {
      headers = { 'Content-Type': 'application/json', 'x-api-key': key, 'anthropic-version': '2023-06-01' };
      body = { model: 'claude-sonnet-4-20250514', max_tokens: 4000, messages: [{ role: 'user', content: prompt }] };
    } else {
      headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key };
      body = { model: 'deepseek-chat', max_tokens: 4000, messages: [{ role: 'user', content: prompt }] };
    }

    fetch(apiUrl, { method: 'POST', headers: headers, body: JSON.stringify(body) })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var text = provider === 'claude'
          ? (data.content && data.content[0] && data.content[0].text || '')
          : (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content || '');
        if (!text) throw new Error('AI 返回内容为空，请检查 API Key');
        // 清理可能的 markdown 包裹
        text = text.replace(/^```json\s*/,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
        var parsed;
        try { parsed = JSON.parse(text); }
        catch(e) {
          // 尝试提取 JSON
          var m = text.match(/\{[\s\S]*\}/);
          if (m) parsed = JSON.parse(m[0]);
          else throw new Error('AI 返回的不是有效 JSON');
        }
        self.showImportPreview(parsed, resultEl);
      })
      .catch(function(err) {
        resultEl.innerHTML = '<div style="padding:12px;background:#fef2f2;border-radius:var(--r);border:1px solid #fecaca;color:#dc2626;font-size:.82rem">❌ 解析失败: ' + err.message + '</div>';

  showImportPreview: function(parsed, resultEl) {

    if (!actions.length) {
      resultEl.innerHTML = '<div style="padding:12px;color:var(--ink4);font-size:.85rem">⚠️ AI 未识别到可导入的数据，请检查文件内容</div>';

    // 每个 action 预览
    actions.forEach(function(a, i) {
      var prod = self.data.products.find(function(p) { return p.model === a.productModel || p.id === a.productModel; });
      var isNew = a.isNew || !prod;
      var conf = Math.round((a.confidence || 0.8) * 100);
      var confColor = conf >= 90 ? 'var(--green)' : conf >= 70 ? 'var(--amber)' : '#ef4444';

      h += '<div style="padding:12px 14px;border-bottom:1px solid var(--bd)" id="preview-' + i + '">';

      h += '<span style="font-size:.72rem;color:' + confColor + ';margin-left:auto">识别置信度 ' + conf + '%</span>';
      h += '</div>';

      // 字段变更预览
      var fields = a.fields || {};
      var fieldNames = { viscosity:'粘度', hardness:'硬度', tensileStrength:'拉伸强度', elongation:'断裂伸长率', specificGravity:'比重', tgValue:'Tg', application:'应用', features:'特性', notes:'备注补充' };
      var hasFields = Object.keys(fields).some(function(k) { return fields[k]; });
      if (hasFields) {
        h += '<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px">';
        Object.entries(fields).forEach(function(fe) {
          if (!fe[1]) return;
          var oldVal = prod ? (prod[fe[0]] || '') : '';
          var isUpdate = oldVal && oldVal !== '-';
          h += '<div style="font-size:.75rem;background:' + (isUpdate ? '#fef3c7' : '#f0fdf4') + ';border-radius:5px;padding:4px 8px">';
          h += '<span style="color:var(--ink4)">' + (fieldNames[fe[0]] || fe[0]) + ': </span>';
          if (isUpdate) h += '<span style="color:#92400e;text-decoration:line-through;margin-right:4px">' + oldVal.substring(0,20) + (oldVal.length>20?'…':'') + '</span>';
          h += '<span style="color:' + (isUpdate ? '#b45309' : 'var(--green)') + '">' + String(fe[1]).substring(0,40) + (String(fe[1]).length>40?'…':'') + '</span>';
          h += '</div>';
        });
        h += '</div>';
      }

      // 测试报告预览
      if (a.testReport && a.testReport.reportId) {
        h += '<div style="font-size:.75rem;background:var(--bbg);border-radius:5px;padding:4px 8px;margin-bottom:8px;color:var(--brand)">📊 新增测试报告: ' + a.testReport.reportId + ' (' + (a.testReport.date || '') + ')</div>';

      h += '<button onclick="document.getElementById(\'preview-' + i + '\').style.opacity=.4" style="padding:5px 14px;border-radius:5px;border:1px solid var(--bd);background:none;color:var(--ink3);font-size:.78rem;cursor:pointer;font-family:var(--f)">✕ 跳过</button>';

  applyImportAction: function(i) {
    var self = this;
    var a = this._importActions && this._importActions[i];
    if (!a) return;
    this._doApply(a);
    var el = document.getElementById('preview-' + i);
    if (el) el.innerHTML = '<div style="padding:8px;color:var(--green);font-size:.82rem">✅ 已应用：' + a.productModel + '</div>';
  },

  applyAllImportActions: function() {
    var self = this;
    (this._importActions || []).forEach(function(a, i) {
      self._doApply(a);
      var el = document.getElementById('preview-' + i);
      if (el) el.innerHTML = '<div style="padding:8px;color:var(--green);font-size:.82rem">✅ 已应用：' + a.productModel + '</div>';
    });
    this.render();
    this.updateStats();
  },

  _doApply: function(a) {
    var self = this;
    var prod = this.data.products.find(function(p) { return p.model === a.productModel || p.id === a.productModel; });

    // 新产品：创建骨架
    if (!prod && a.isNew) {
      prod = { id: a.productModel, model: a.productModel, productType: '-', materialPlatform: '-', chemistry: '未知', cureMethod: '待确定', brand: '-', isCompetitor: false, testReports: [], notes: '', lastUpdated: new Date().toISOString().slice(0,10) };
      this.data.products.push(prod);
      this.data.products.sort(function(x, y) { return x.model.localeCompare(y.model); });
    }
    if (!prod) return;

    // 更新字段（空值跳过；notes 追加而不覆盖）
    var fields = a.fields || {};
    Object.entries(fields).forEach(function(fe) {
      if (!fe[1]) return;
      if (fe[0] === 'notes') {
        prod.notes = (prod.notes ? prod.notes + '\n\n' : '') + fe[1];
      } else {
        // 只在原值为空或"-"时更新，避免覆盖 Notion 数据
        if (!prod[fe[0]] || prod[fe[0]] === '-') prod[fe[0]] = fe[1];
      }
    });

    // 追加测试报告
    if (a.testReport && a.testReport.reportId) {
      if (!prod.testReports) prod.testReports = [];
      var exists = prod.testReports.find(function(r) { return r.reportId === a.testReport.reportId; });
      if (!exists) {
        prod.testReports.push(a.testReport);
      }
    }

    prod.lastUpdated = new Date().toISOString().slice(0,10);
  },

  saveKey: function() { try { var k = document.getElementById('aiKey').value || document.getElementById('importKey').value; var p = document.getElementById('aiProvider').value; localStorage.setItem('db_ai_key', k); localStorage.setItem('db_ai_provider', p); if (k) { document.getElementById('importKey').value = k; document.getElementById('aiKey').value = k; } } catch(e) {} },
};

function doAIRecommend() {
  var input = document.getElementById('aiInput').value.trim(); if (!input) return;
  var apiKey = document.getElementById('aiKey').value.trim();
  if (!apiKey) { alert('请先输入 API Key'); return; }
  APP.saveKey();
  var provider = document.getElementById('aiProvider').value;
  var re = document.getElementById('aiResult'), sb = document.getElementById('aiSubmit');
  sb.disabled = true; re.innerHTML = '<span class="aild">\u23f3 正在分析产品库并匹配需求\u2026</span>'; re.style.display = 'block';
  var summary = APP.data.products.map(function(p) {
    var parts = [p.model];
    if (p.displayType && p.displayType !== '未分类') parts.push(p.displayType);
    if (p.chemistry && p.chemistry !== '未知' && p.chemistry !== '-') parts.push(p.chemistry);
    if (p.cureMethod && p.cureMethod !== '待确定' && p.cureMethod !== '-') parts.push(p.cureMethod);
    if (p.viscosity) parts.push('\u7c98\u5ea6:' + exN(p.viscosity)); if (p.hardness) parts.push('\u786c\u5ea6:' + exN(p.hardness));
    if (p.tensileStrength) parts.push('\u62c9\u4f38:' + exN(p.tensileStrength) + 'MPa'); if (p.elongation) parts.push('\u4f38\u957f:' + exN(p.elongation) + '%');
    if (p.tgValue) parts.push('Tg:' + exN(p.tgValue)); if (p.modulus) parts.push('\u6a21\u91cf:' + p.modulus);
    if (p.application && p.application !== '-') parts.push(p.application.substring(0, 80));
    if (p.features && p.features !== '-') parts.push(p.features.substring(0, 80));
    if (p.isCompetitor) parts.push('[\u7ade\u54c1]');
    return parts.join(' | ');
  }).join('\n');
  var sys = '\u4f60\u662f\u5fb7\u90a6\u79d1\u6280\u7684\u80f6\u6c34\u4ea7\u54c1\u6280\u672f\u987e\u95ee\u3002\u4ee5\u4e0b\u662f\u5b8c\u6574\u7684\u80f6\u6c34\u4ea7\u54c1\u5e93\u6570\u636e\uff08\u6bcf\u884c\u4e00\u4e2a\u4ea7\u54c1\uff0c\u5b57\u6bb5\u7528|\u5206\u9694\uff09\uff1a\n\n' + summary + '\n\n\u6839\u636e\u7528\u6237\u63cf\u8ff0\u7684\u9700\u6c42\u573a\u666f\uff0c\u4ece\u4ea7\u54c1\u5e93\u4e2d\u63a8\u8350\u6700\u5339\u914d\u7684\u4ea7\u54c1\uff08\u6700\u591a5\u6b3e\uff09\uff0c\u5e76\u7ed9\u51fa\u63a8\u8350\u7406\u7531\u30021.\u5206\u6790\u5ba2\u6237\u9700\u6c42\u5173\u952e\u6307\u6807 2.\u6309\u5339\u914d\u5ea6\u5217\u51fa\u63a8\u8350\u4ea7\u54c1 3.\u8bf4\u660e\u5dee\u8ddd 4.\u4e2d\u6587\u56de\u7b54';
  var url = provider === 'claude' ? 'https://api.anthropic.com/v1/messages' : 'https://api.deepseek.com/chat/completions';
  var headers, body;
  if (provider === 'claude') {
    headers = { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' };
    body = JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 2000, system: sys, messages: [{ role: 'user', content: input }] });
  } else {
    headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey };
    body = JSON.stringify({ model: 'deepseek-chat', max_tokens: 2000, messages: [{ role: 'system', content: sys }, { role: 'user', content: input }] });
  }
  fetch(url, { method: 'POST', headers: headers, body: body }).then(function(resp) { return resp.json(); }).then(function(data) {
    var text = '';
    if (provider === 'claude') text = (data.content || []).map(function(c) { return c.text || ''; }).join('');
    else text = (data.choices && data.choices[0] && data.choices[0].message) ? data.choices[0].message.content : '';
    if (!text) text = '\u672a\u83b7\u53d6\u5230\u6709\u6548\u54cd\u5e94\uff0c\u8bf7\u68c0\u67e5 API Key\u3002';
    re.innerHTML = esc(text);
    sb.disabled = false;
  }).catch(function(err) { re.innerHTML = '<span style="color:var(--red)">\u8bf7\u6c42\u5931\u8d25\uff1a' + esc(err.message) + '</span>'; sb.disabled = false; });
}

document.addEventListener('DOMContentLoaded', function() { APP.init(); });

</script>
